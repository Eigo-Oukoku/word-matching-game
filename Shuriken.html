<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="google" content="notranslate">
  <title>Shuriken Slinger - ELKえいご王国</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #1a1a2e;
      --gold: #dfb15b;
      --crimson: #E63946;
      --bg: #f5f5f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
    }

    body {
      background-color: var(--ink);
      color: #fff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #elk-header {
      background: rgba(0,0,0,0.4);
      padding: 12px;
      text-align: center;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    #game-container {
      flex: 1;
      position: relative;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%);
      overflow: hidden;
    }

    .shuriken-ui-top {
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      position: relative;
      z-index: 10;
    }

    .stat-label {
      font-family: 'Bangers', cursive;
      font-size: 26px;
      letter-spacing: 1px;
      color: var(--gold);
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    /* お題エリア */
    #prompt-box {
      text-align: center;
      padding: 15px;
      background: rgba(255,255,255,0.03);
      border-bottom: 2px solid var(--gold);
      margin-bottom: 10px;
    }
    #prompt-word {
      font-size: 40px; /* お題も少し大きく */
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 15px rgba(223, 177, 91, 0.4);
    }

    /* プレイエリア */
    #stage {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* 【修正】単語を大きく、札をタップしやすく */
    .falling-item {
      position: absolute;
      padding: 15px 30px; /* 余白を増やしてタップ判定を拡大 */
      background: #fff;
      color: var(--ink);
      border-radius: 12px;
      font-weight: 900;
      font-size: 2.2rem; /* フォントサイズを大幅に拡大 */
      box-shadow: 0 6px 0 #bbb;
      white-space: nowrap;
      cursor: pointer;
      will-change: transform;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 120px;
    }

    .shuriken {
      position: absolute;
      width: 40px;
      height: 40px;
      pointer-events: none;
      z-index: 20;
      transition: all 0.1s linear;
    }

    /* スクリーン */
    .overlay-screen {
      position: absolute;
      inset: 0;
      background: var(--ink);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
    }

    h1.title {
      font-family: 'Bangers', cursive;
      font-size: 64px;
      color: var(--gold);
      line-height: 0.9;
      margin-bottom: 30px;
      text-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .btn-main {
      background: var(--gold);
      color: var(--ink);
      border: none;
      padding: 18px 50px;
      font-family: 'Bangers', cursive;
      font-size: 32px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 0 #b08d48;
      margin: 12px;
      width: 85%;
      max-width: 320px;
    }
    .btn-main:active { transform: translateY(3px); box-shadow: 0 3px 0 #b08d48; }

    .result-score-val {
      font-family: 'Bangers', cursive;
      font-size: 80px;
      color: var(--gold);
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <div id="elk-header">
    <div style="font-family:'Bangers'; color:var(--gold); letter-spacing: 4px; font-size: 18px;">SHURIKEN SLINGER</div>
  </div>

  <div id="game-container">
    <div class="shuriken-ui-top">
      <div class="stat-label" id="ui-score">SCORE: 0</div>
      <div class="stat-label" id="ui-timer">60s</div>
    </div>

    <div id="prompt-box">
      <div style="font-size: 12px; color: var(--gold); letter-spacing: 3px; font-weight: 700;">MISSION TARGET</div>
      <div id="prompt-word">READY?</div>
    </div>

    <div id="stage"></div>

    <div id="start-screen" class="overlay-screen">
      <h1 class="title">SHURIKEN<br>SLINGER</h1>
      <button class="btn-main" onclick="bootGame()">START MISSION</button>
    </div>

    <div id="result-screen" class="overlay-screen" style="display:none;">
      <h1 class="title">MISSION<br>COMPLETE</h1>
      <div class="result-score-val" id="final-score">0</div>
      <div id="result-stats" style="font-size:20px; margin-bottom:30px; color: #aaa;"></div>
      <button class="btn-main" onclick="location.reload()">RETRY</button>
      <button class="btn-main" style="background:#8E44AD; color:#fff; box-shadow:0 6px 0 #5b2d6e;" onclick="NinjaUI.openAnalysis()">ANALYSIS</button>
    </div>
  </div>

  <script src="ninja-core.js"></script>
  <script src="ninja-ui.js"></script>

  <script>
    Ninja.configure({
      gameId: 'shuriken-slinger',
      gameLabel: 'Shuriken Slinger',
      xpMultiplier: 1.0
    });
    Ninja.boot();

    const vocab = [
      {en: "apple", jp: "りんご"}, {en: "run", jp: "走る"}, {en: "fast", jp: "速い"},
      {en: "jump", jp: "飛ぶ"}, {en: "book", jp: "本"}, {en: "water", jp: "水"},
      {en: "sword", jp: "剣"}, {en: "night", jp: "夜"}, {en: "silent", jp: "静かな"}
    ];

    let score = 0;
    let timeLeft = 60;
    let currentTarget = null;
    let gameActive = false;
    let activeItems = [];
    let lastTime = 0;

    function bootGame() {
      document.getElementById('start-screen').style.display = 'none';
      gameActive = true;
      nextTarget();
      spawnLoop();
      requestAnimationFrame(gameLoop);
      startTimer();
    }

    function startTimer() {
      const t = setInterval(() => {
        if(!gameActive) { clearInterval(t); return; }
        timeLeft--;
        document.getElementById('ui-timer').textContent = `${timeLeft}s`;
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function nextTarget() {
      currentTarget = vocab[Math.floor(Math.random() * vocab.length)];
      document.getElementById('prompt-word').textContent = currentTarget.jp;
      speak(currentTarget.en);
    }

    function spawnLoop() {
      if (!gameActive) return;
      
      const item = document.createElement('div');
      item.className = 'falling-item';
      
      const isCorrect = Math.random() > 0.7;
      const wordObj = isCorrect ? currentTarget : vocab[Math.floor(Math.random()*vocab.length)];
      
      item.textContent = wordObj.en;
      
      // 文字が大きいため、画面端から少し内側に出現させる
      item.style.left = Math.random() * 50 + 10 + "%";
      item.style.top = "-100px";
      
      document.getElementById('stage').appendChild(item);
      
      const data = { 
        el: item, 
        y: -100, 
        word: wordObj.en, 
        correct: (wordObj.en === currentTarget.en),
        speed: 1.8 + Math.random() * 1.5 
      };
      activeItems.push(data);

      item.onmousedown = (e) => throwShuriken(e, data);
      item.ontouchstart = (e) => { e.preventDefault(); throwShuriken(e.touches[0], data); };

      setTimeout(spawnLoop, 1200 - Math.min(score, 600)); 
    }

    function gameLoop(timestamp) {
      if (!gameActive) return;

      for (let i = activeItems.length - 1; i >= 0; i--) {
        const item = activeItems[i];
        item.y += item.speed;
        item.el.style.transform = `translateY(${item.y}px)`;
        
        if (item.y > 800) {
          item.el.remove();
          activeItems.splice(i, 1);
        }
      }
      requestAnimationFrame(gameLoop);
    }

    function throwShuriken(e, data) {
      const stage = document.getElementById('stage');
      const rect = stage.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      const shuriken = document.createElement('img');
      shuriken.src = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 0 L60 40 L100 50 L60 60 L50 100 L40 60 L0 50 L40 40 Z" fill="%23dfb15b" stroke="%23000" stroke-width="4"/></svg>`;
      shuriken.className = 'shuriken';
      shuriken.style.left = "50%";
      shuriken.style.top = "95%";
      stage.appendChild(shuriken);

      setTimeout(() => {
        shuriken.style.left = (clickX - 20) + "px";
        shuriken.style.top = (clickY - 20) + "px";
        shuriken.style.transform = "rotate(360deg)";
        
        setTimeout(() => {
          shuriken.remove();
          handleHit(data);
        }, 100);
      }, 10);
    }

    function handleHit(data) {
      Ninja.recordAnswer({word: data.word}, data.correct, 1000);

      if (data.correct) {
        score += 10;
        document.getElementById('ui-score').textContent = `SCORE: ${score}`;
        data.el.style.backgroundColor = "var(--gold)";
        data.el.style.color = "#000";
        nextTarget();
      } else {
        score = Math.max(0, score - 5);
        document.getElementById('ui-score').textContent = `SCORE: ${score}`;
        data.el.style.backgroundColor = "var(--crimson)";
        data.el.style.color = "#fff";
      }

      data.el.style.opacity = "0";
      data.el.style.pointerEvents = "none";
      setTimeout(() => data.el.remove(), 150);
      
      const idx = activeItems.indexOf(data);
      if(idx > -1) activeItems.splice(idx, 1);
    }

    function endGame() {
      gameActive = false;
      const earnedXp = Math.floor(score / 2);
      Ninja.addExp(earnedXp);

      document.getElementById('result-screen').style.display = 'flex';
      document.getElementById('final-score').textContent = score;
      document.getElementById('result-stats').innerHTML = `GAINED XP: +${earnedXp}`;
    }

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const ut = new SpeechSynthesisUtterance(text);
      ut.lang = 'en-US';
      ut.rate = 1.0;
      speechSynthesis.speak(ut);
    }
  </script>
</body>
</html>
